app:
  host: "0.0.0.0"
  port: 8000

mcp:
  auto_start: true
  allow_partial_start: true
  startup_timeout_seconds: 20
  stop_on_shutdown: true

  servers:
    excel-mcp:
      base_url: "http://127.0.0.1:8101"
      cmd:
        - "python"
        - "-m"
        - "uvicorn"
        - "Multi_agen.mcp_servers.excel_mcp.http_app:app"
        - "--host"
        - "127.0.0.1"
        - "--port"
        - "8101"
        - "--log-level"
        - "debug"

    ocr-mcp:
      base_url: "http://127.0.0.1:8102"
      cmd:
        - "python"
        - "-m"
        - "uvicorn"
        - "Multi_agen.mcp_servers.ocr_mcp.http_app:app"
        - "--host"
        - "127.0.0.1"
        - "--port"
        - "8102"
        - "--log-level"
        - "debug"

    # mem0-mcp:
    #   base_url: "http://127.0.0.1:8103"
    #   cmd:
    #     - "python"
    #     - "-m"
    #     - "uvicorn"
    #     - "Multi_agen.mcp_servers.mem0_mcp.http_app:app"
    #     - "--host"
    #     - "127.0.0.1"
    #     - "--port"
    #     - "8103"
    #     - "--log-level"
    #     - "debug"

  available_capabilities:
    - "excel.list_sheets"
    - "excel.read_sheet_range"
    - "excel.find_text"
    - "excel.column_index_to_letter"
    - "excel.write_cells"
    - "excel.detect_merged_cells"
    - "excel.get_formulas"
    - "ocr.render_sheet_image"
    - "ocr.extract_text"
    - "memory.get"
    - "memory.put"

llm:
  enabled: true